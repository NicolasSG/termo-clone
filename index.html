<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <!-- <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    /> -->

    <title>Termo</title>
  </head>
  <body>
    <main class="main">
      <section class="main__grid">
        <div class="grid__row grid__1_row grid__row_active">
          <div class="grid_letter grid_letter_1"></div>
          <div class="grid_letter grid_letter_2"></div>
          <div class="grid_letter grid_letter_3"></div>
          <div class="grid_letter grid_letter_4"></div>
          <div class="grid_letter grid_letter_5"></div>
        </div>
        <div class="grid__row grid__2_row">
          <div class="grid_letter grid_letter_1"></div>
          <div class="grid_letter grid_letter_2"></div>
          <div class="grid_letter grid_letter_3"></div>
          <div class="grid_letter grid_letter_4"></div>
          <div class="grid_letter grid_letter_5"></div>
        </div>
        <div class="grid__row grid__3_row">
          <div class="grid_letter grid_letter_1"></div>
          <div class="grid_letter grid_letter_2"></div>
          <div class="grid_letter grid_letter_3"></div>
          <div class="grid_letter grid_letter_4"></div>
          <div class="grid_letter grid_letter_5"></div>
        </div>
        <div class="grid__row grid__4_row">
          <div class="grid_letter grid_letter_1"></div>
          <div class="grid_letter grid_letter_2"></div>
          <div class="grid_letter grid_letter_3"></div>
          <div class="grid_letter grid_letter_4"></div>
          <div class="grid_letter grid_letter_5"></div>
        </div>
        <div class="grid__row grid__5_row">
          <div class="grid_letter grid_letter_1"></div>
          <div class="grid_letter grid_letter_2"></div>
          <div class="grid_letter grid_letter_3"></div>
          <div class="grid_letter grid_letter_4"></div>
          <div class="grid_letter grid_letter_5"></div>
        </div>
      </section>
      <section class="keyboard">
        <div class="keyboard__1_row">
          <div class="kbd__letter kbd__Q">Q</div>
          <div class="kbd__letter kbd__W">W</div>
          <div class="kbd__letter kbd__E">E</div>
          <div class="kbd__letter kbd__R">R</div>
          <div class="kbd__letter kbd__T">T</div>
          <div class="kbd__letter kbd__Y">Y</div>
          <div class="kbd__letter kbd__U">U</div>
          <div class="kbd__letter kbd__I">I</div>
          <div class="kbd__letter kbd__O">O</div>
          <div class="kbd__letter kbd__P">P</div>
        </div>
        <div class="keyboard__2_row">
          <div class="kbd__letter kbd__A">A</div>
          <div class="kbd__letter kbd__S">S</div>
          <div class="kbd__letter kbd__D">D</div>
          <div class="kbd__letter kbd__F">F</div>
          <div class="kbd__letter kbd__G">G</div>
          <div class="kbd__letter kbd__H">H</div>
          <div class="kbd__letter kbd__J">J</div>
          <div class="kbd__letter kbd__K">K</div>
          <div class="kbd__letter kbd__L">L</div>
          <div class="kbd__letter kbd__backspace">&lt;=</div>
        </div>
        <div class="keyboard__3_row">
          <div class="kbd__letter kbd__Z">Z</div>
          <div class="kbd__letter kbd__X">X</div>
          <div class="kbd__letter kbd__C">C</div>
          <div class="kbd__letter kbd__V">V</div>
          <div class="kbd__letter kbd__B">B</div>
          <div class="kbd__letter kbd__N">N</div>
          <div class="kbd__letter kbd__M">M</div>
          <div class="kbd__letter kbd__enter">ENTER</div>
        </div>
      </section>
    </main>
  </body>
  <script src="./script.js" type="module"></script>
</html>
