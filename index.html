<!doctype html>

    <title>Termo</title>

  <body>
    <header class="header">
      <nav class="header__nav_games">
        <button class="header__nav_game header__nav_game_termo">termo</button>
        <button class="header__nav_game header__nav_game_dueto">dueto</button>
        <button class="header__nav_game header__nav_game_quarteto">
          quarteto
        </button>
        <button class="header__info">
          <img
            class="header__info_image"
            src="./assets/images/button_info.svg"
            alt=""
          />
        </button>
      </nav>
      <nav class="header__nav_menus">
        <div class="header__nav_menu_left-side">
          <button class="header__hide header_nav_manu">
            <img
              class="header__images"
              src="./assets/images/button_hide.svg"
              alt=""
            />
          </button>
          <button class="header__question_mark header_nav_manu">?</button>
        </div>
        <h1 class="header__h1">TERMO</h1>
        <div class="header__nav_menu_right-side">
          <button class="header__statistics header_nav_manu">
            <img
              class="header__images"
              src="./assets/images/button_statistics.svg"
              alt=""
            />
          </button>
          <button
            class="header__options header_nav_manu header__nav_menu_right-side"
          >
            <img
              class="header__images"
              src="./assets/images/button_config.svg"
              alt=""
            />
          </button>
        </div>
      </nav>
    </header>
